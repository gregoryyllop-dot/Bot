<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seimi Bot - Chroniques de la Zone 5</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
        }
        h1 { color: #5865F2; margin-bottom: 10px; }
        p { color: #a3a6aa; font-size: 1.1em; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #248046;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 20px;
        }
        .dot { width: 10px; height: 10px; background: #3ba55d; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 SEIMI BOT</h1>
        <p>Le système de gestion et de modération officiel du serveur <strong>Chroniques de la Zone 5</strong>.</p>
        <div class="status">
            <span class="dot"></span> Opérationnel sur Render
        </div>
    </div>
</body>
</html>
